description: "Test agent delegation decisions"
prompts:
  - "I need to implement a new feature that adds OAuth2 support to the API. How should we approach this?"
  - "Fix the typo in README.md line 42."
providers:
  - id: anthropic:claude-sonnet-4-6
tests:
  - vars:
      prompt: "I need to implement a new feature that adds OAuth2 support to the API. How should we approach this?"
    assert:
      - type: contains
        value: "the-architect"
  - vars:
      prompt: "Fix the typo in README.md line 42."
    assert:
      - type: not-contains
        value: "the-architect"
