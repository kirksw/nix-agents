name: Nightly Flake Update

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nightly-flake-update
  cancel-in-progress: false

jobs:
  update-flake:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake inputs
        run: nix flake update

      - name: Validate updated flake
        run: nix flake check

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/nightly-flake-update
          base: main
          commit-message: "chore: update flake.lock"
          title: "chore: nightly flake input update"
          body: |
            Automated nightly refresh of `flake.lock`.

            - runs `nix flake update`
            - validates the result with `nix flake check`
          add-paths: |
            flake.lock
          delete-branch: true
